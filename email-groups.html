// Deduplicate case-insensitive
const seen = new Set();
const unique = [];
rawEmails.forEach(e => {
    const lower = e.toLowerCase().trim();
    if (!seen.has(lower) && lower.length > 0) {
        seen.add(lower);
        unique.push(e);
    }
});

document.getElementById('stats').innerHTML = `<span>${unique.length}</span> unique emails &bull; <span>${Math.ceil(unique.length / 50)}</span> groups of 50`;

const container = document.getElementById('groups');

for (let i = 0; i < unique.length; i += 50) {
    const group = unique.slice(i, i + 50);
    const groupNum = Math.floor(i / 50) + 1;
    const csv = group.join(', ');

    const div = document.createElement('div');
    div.className = 'group';
    div.innerHTML = `
        <div class="group-header">
            <div><span class="group-title">Group ${groupNum}</span><span class="group-count">(${group.length} emails)</span></div>
            <button class="copy-btn" onclick="copyGroup(this, ${groupNum})">Copy Group ${groupNum}</button>
        </div>
        <div class="group-body">
            <div class="emails" id="group-${groupNum}">${csv}</div>
        </div>
    `;
    container.appendChild(div);
}

function copyGroup(btn, num) {
    const text = document.getElementById('group-' + num).textContent;
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = 'Copy Group ' + num;
            btn.classList.remove('copied');
        }, 2000);
    });
}

function copyAll() {
    const all = unique.join(', ');
    navigator.clipboard.writeText(all).then(() => {
        const btns = document.querySelectorAll('.copy-all button');
        btns.forEach(b => {
            b.textContent = 'Copied All!';
            b.style.background = '#22c55e';
            setTimeout(() => {
                b.textContent = 'Copy ALL Emails (Comma Separated)';
                b.style.background = '';
            }, 2000);
        });
    });
}
